<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مخطط إيجارات الشقق — Gantt Chart</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1A365D;--navy2:#2B4C7E;--bg:#F5F6FA;--card:#FFF;
  --border:#E2E8F0;--border-light:#EDF2F7;--text:#2D3748;--text-mid:#4A5568;--text-light:#718096;--text-muted:#A0AEC0;
  --accent-blue:#2196F3;--accent-green:#4CAF50;--accent-orange:#FF9800;
  --row-alt:#F8FAFC;--header-bg:#F7FAFC;
  --red:#E53E3E;--red-light:#FED7D7;--red-bg:#FFF5F5;
  --clr-yearly:#93C5FD;--clr-yearly-dark:#3B82F6;
  --clr-monthly:#FDBA74;--clr-monthly-dark:#F97316;
  --clr-other:#D1D5DB;--clr-other-dark:#6B7280;
  --clr-leave:#FCA5A5;--clr-leave-dark:#EF4444;
  --badge-bg:#374151;--badge-text:#F9FAFB;--badge-empty-bg:#E5E7EB;--badge-empty-text:#9CA3AF;
  --grid-color:#CBD5E0;--grid-width:1.5px;
  --label-w:82px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;background:linear-gradient(135deg,var(--bg),#EEF1F8);color:var(--text);min-height:100vh}
::-webkit-scrollbar{height:8px;width:8px}
::-webkit-scrollbar-track{background:#EEF0F5;border-radius:4px}
::-webkit-scrollbar-thumb{background:#B0B8C9;border-radius:4px}

@media print{
  body{background:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .no-print{display:none!important}
  .header-print{display:block!important}
  .chart-wrap{box-shadow:none!important;overflow:visible!important}
  .stat-card{box-shadow:none!important;border:1px solid #ddd}
  .sticky-clone{display:none!important}
  /* ★ Page size injected dynamically per view (landscape for gantt, portrait for reports) */
  @page{margin:8mm;
    @bottom-center{content:"صفحة " counter(page) " من " counter(pages);font-family:'Tajawal',sans-serif;font-size:10pt;color:#718096}
  }
}
.header-print{display:none}

.header{background:linear-gradient(135deg,var(--navy),var(--navy2) 50%,var(--navy));padding:18px 28px;color:#fff}
.header-inner{max-width:1300px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.header h1{font-size:22px;font-weight:800;letter-spacing:-.5px}
.header p{font-size:13px;opacity:.8;margin-top:3px;font-weight:300}
.header-btns{display:flex;gap:8px;flex-wrap:wrap}
.action-btn{padding:8px 20px;background:rgba(255,255,255,.13);color:#fff;border:1px solid rgba(255,255,255,.28);border-radius:8px;cursor:pointer;font:500 13px 'Tajawal',sans-serif;transition:background .2s;white-space:nowrap}
.action-btn:hover{background:rgba(255,255,255,.22)}

.header-print{padding:16px 28px 14px;border-bottom:3px solid var(--navy);margin-bottom:10px;text-align:center}
.hp-title{font-size:20px;font-weight:800;color:var(--navy);margin:0}
.hp-sub{font-size:12px;color:var(--text-light);margin-top:2px}
.hp-year{display:inline-block;margin-top:8px;font-size:28px;font-weight:800;color:var(--navy);background:var(--header-bg);border:2.5px solid var(--navy);border-radius:10px;padding:3px 28px;letter-spacing:2px}

.share-toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);color:#fff;padding:12px 24px;border-radius:10px;font:600 14px 'Tajawal';box-shadow:0 6px 20px rgba(0,0,0,.25);z-index:2000;transition:transform .3s ease,opacity .3s ease;opacity:0;pointer-events:none}
.share-toast.show{transform:translateX(-50%) translateY(0);opacity:1}

.legend-row{max-width:1300px;margin:10px auto 0;padding:0 28px;display:flex;gap:16px;flex-wrap:wrap;align-items:center;font-size:12px;color:var(--text-mid)}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-swatch{width:22px;height:12px;border-radius:3px;border:1px solid rgba(0,0,0,.1)}

.overlap-banner{max-width:1300px;margin:10px auto 0;padding:0 28px}
.overlap-banner-inner{background:var(--red-bg);border:1.5px solid var(--red-light);border-radius:10px;padding:10px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ob-icon{font-size:22px}.ob-title{font-size:14px;font-weight:700;color:var(--red)}.ob-list{font-size:12px;color:#C53030;font-weight:500}

.controls{max-width:1300px;margin:16px auto 0;padding:0 28px;display:flex;gap:20px;flex-wrap:wrap;align-items:flex-end}
.ctrl-group{display:flex;flex-direction:column;gap:4px}
.ctrl-label{font-size:12px;font-weight:600;color:var(--text-mid)}
.year-sel{display:flex;align-items:center;border:1.5px solid #CBD5E0;border-radius:8px;overflow:hidden;background:var(--card)}
.year-arrow{width:36px;height:38px;border:none;background:#EDF2F7;cursor:pointer;font-size:13px;color:var(--text-mid);font-family:'Tajawal';transition:background .15s;position:relative}
.year-arrow:hover{background:#E2E8F0}
.year-arrow .arrow-tip{display:none;position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;font-size:10px;padding:3px 8px;border-radius:5px;white-space:nowrap;z-index:20;font-weight:600}
.year-arrow:hover .arrow-tip{display:block}
.year-sel select{border:none;padding:6px 18px;font:700 15px 'Tajawal';color:var(--navy);text-align:center;outline:none;background:transparent;cursor:pointer;appearance:none;min-width:72px}
.bld-select{padding:7px 14px;border:1.5px solid #CBD5E0;border-radius:8px;font:400 14px 'Tajawal';color:var(--text);background:var(--card);cursor:pointer;outline:none;min-width:130px}

/* ★ Zoom buttons */
.zoom-btns{display:flex;border:1.5px solid #CBD5E0;border-radius:8px;overflow:hidden;background:var(--card)}
.zoom-btn{padding:6px 14px;border:none;background:transparent;cursor:pointer;font:600 12px 'Tajawal';color:var(--text-mid);transition:background .15s;border-left:1px solid #CBD5E0}
.zoom-btn:first-child{border-left:none}
.zoom-btn:hover{background:#EDF2F7}
.zoom-btn.active{background:var(--navy);color:#fff}

.stats-row{max-width:1300px;margin:14px auto;padding:0 28px;display:flex;gap:12px;flex-wrap:wrap}
.stat-card{flex:1 1 140px;background:var(--card);border-radius:10px;padding:12px 16px;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:transform .15s}
.stat-card:hover{transform:translateY(-2px)}
.stat-val{font-size:20px;font-weight:800;color:var(--navy)}
.stat-val .stat-total{font-size:13px;font-weight:500;color:var(--text-muted)}
.stat-lbl{font-size:11px;color:var(--text-light);font-weight:500;margin-top:2px}
.stat-sub{font-size:10.5px;color:var(--text-muted);margin-top:5px;line-height:1.7}
.stat-sub b{color:var(--text-mid);font-weight:600}
.stat-sub .s-red{color:var(--red);font-weight:600}

.chart-container{max-width:1300px;margin:14px auto;padding:0 28px}
.chart-wrap{background:var(--card);border-radius:12px;box-shadow:0 2px 14px rgba(0,0,0,.06);overflow-x:auto;position:relative}
.chart-inner{transition:min-width .3s ease}
.g-table{width:100%;border-collapse:collapse}
.g-table thead th{background:var(--header-bg);border-bottom:2px solid var(--border);border-left:var(--grid-width) solid var(--grid-color);padding:7px 0;text-align:center;font-size:12px;font-weight:600;color:var(--text-mid);vertical-align:middle}
.g-table thead th .en{font-size:10px;color:var(--text-muted);font-weight:400}

/* ★ Sticky first column */
.g-table thead th.label-th,
.g-table .label-td,
.g-table tfoot td:first-child{
  width:var(--label-w);min-width:var(--label-w);
  position:sticky;right:0;z-index:6;
  background:var(--header-bg);
}
.g-table thead th.label-th{font-size:11px;font-weight:700;z-index:12}
.g-table .label-td{border-left:var(--grid-width) solid var(--grid-color);text-align:center;padding:6px 4px;box-shadow:-2px 0 4px rgba(0,0,0,.05)}
.g-table tfoot td{background:var(--header-bg);border-top:2px solid var(--border);border-left:var(--grid-width) solid var(--grid-color);text-align:center;font-size:10px;color:var(--text-muted);padding:5px 0}
.g-row td{border-bottom:1px solid var(--border-light);padding:0;vertical-align:middle}
.g-row:nth-child(even) td{background:var(--row-alt)}
.g-row:nth-child(even) .label-td{background:var(--row-alt)}
.g-row:nth-child(odd) .label-td{background:#fff}

.apt-badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:6px;white-space:nowrap;display:inline-block;background:var(--badge-bg);color:var(--badge-text)}
.apt-badge.empty{background:var(--badge-empty-bg);color:var(--badge-empty-text)}
.label-icons{display:flex;align-items:center;justify-content:center;gap:3px;margin-top:3px;font-size:10px}
.overlap-warn{color:#D97706;cursor:help}
.leave-warn{color:var(--red);cursor:help}
.bars-td{position:relative;padding:0!important}
.bars-wrap{position:absolute;inset:0}
.grid-line{position:absolute;top:0;bottom:0;width:var(--grid-width);background:var(--grid-color);pointer-events:none}
/* ★ Today line always full opacity */
.today-line{position:absolute;top:0;bottom:0;width:2.5px;background:var(--red);z-index:8;pointer-events:none;opacity:1!important}
.today-label{position:absolute;top:2px;font-size:8px;font-weight:700;color:#fff;background:var(--red);padding:1px 5px;border-radius:3px;white-space:nowrap;transform:translateX(50%)}
.gantt-bar{position:absolute;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;overflow:visible;transition:filter .15s,transform .15s;z-index:2}
.gantt-bar:hover{filter:brightness(1.08) saturate(1.2);transform:scaleY(1.12);box-shadow:0 3px 10px rgba(0,0,0,.22);z-index:5}
.bar-inner{position:absolute;inset:0;border-radius:5px;overflow:hidden;display:flex;align-items:center;justify-content:center;border:1.5px solid rgba(0,0,0,.08)}
.bar-text{font-size:10px;font-weight:700;white-space:nowrap;padding:0 5px;pointer-events:none;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.leave-marker{position:absolute;top:-2px;bottom:-2px;width:5px;background:repeating-linear-gradient(45deg,var(--red),var(--red) 2px,#fff 2px,#fff 4px);border-radius:3px 0 0 3px;pointer-events:none;z-index:3;left:-2px}
.leave-tag{position:absolute;top:-14px;left:0;font-size:7.5px;font-weight:700;color:#fff;background:var(--red);padding:1px 4px;border-radius:3px;white-space:nowrap;pointer-events:none;z-index:4}

.sticky-clone{position:fixed;top:48px;z-index:45;background:var(--header-bg);border-bottom:2px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.12);display:none;overflow:hidden;pointer-events:none}
.sticky-clone table{border-collapse:collapse}
.sticky-clone th{background:var(--header-bg);border-left:var(--grid-width) solid var(--grid-color);padding:7px 0;text-align:center;font-size:12px;font-weight:600;color:var(--text-mid)}
.sticky-clone th .en{font-size:10px;color:var(--text-muted);font-weight:400}

.tooltip-overlay{position:fixed;inset:0;z-index:999}
.tooltip-card{position:fixed;background:var(--card);border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,.18),0 0 0 1px rgba(0,0,0,.05);width:280px;overflow:hidden;z-index:1000;animation:tipIn .2s ease}
@keyframes tipIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.tip-close{position:absolute;top:8px;left:10px;cursor:pointer;font-size:15px;color:#fff;opacity:.8;z-index:1;background:none;border:none}.tip-close:hover{opacity:1}
.tip-head{background:linear-gradient(135deg,var(--navy),var(--navy2));padding:13px 16px;display:flex;justify-content:space-between;align-items:center}
.tip-badge{color:#fff;padding:3px 11px;border-radius:6px;font-size:14px;font-weight:800}
.tip-amount{color:#FFD54F;font-size:15px;font-weight:700}
.tip-body{padding:10px 16px}
.tip-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #F0F0F0;font-size:13px}.tip-row:last-child{border-bottom:none}
.tip-lbl{color:var(--text-light);font-weight:500}
.tip-val{color:var(--text);font-weight:600;text-align:left;max-width:58%;word-break:break-word}
.tip-row-red{background:var(--red-bg);border-radius:6px;margin:4px -6px;padding:6px!important}
.tip-row-red .tip-lbl{color:var(--red);font-weight:700}.tip-row-red .tip-val{color:var(--red);font-weight:800}

.empty-state{padding:50px 20px;text-align:center;color:var(--text-muted);font-size:16px}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}
.spinner{width:42px;height:42px;border:4px solid var(--border);border-top-color:var(--accent-blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{margin-top:16px;color:var(--text-mid);font-size:16px}
.error-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;text-align:center;padding:24px}
.error-screen .icon{font-size:50px}.error-screen h3{font-size:20px;color:var(--red);margin-top:12px}.error-screen p{font-size:14px;color:var(--text-light);margin-top:8px;max-width:420px}
.retry-btn{margin-top:16px;padding:10px 28px;background:var(--accent-blue);color:#fff;border:none;border-radius:8px;cursor:pointer;font:600 14px 'Tajawal';transition:background .2s}.retry-btn:hover{background:#1976D2}
.footer{max-width:1300px;margin:14px auto;padding:12px 28px;text-align:center;color:var(--text-muted);font-size:12px}

/* ============ TABS NAV ============ */
.tabs-row{background:#fff;border-bottom:1px solid var(--border);padding:0 28px;position:sticky;top:0;z-index:50;box-shadow:0 2px 6px rgba(0,0,0,.04)}
.tabs-inner{max-width:1300px;margin:0 auto;display:flex;gap:4px;overflow-x:auto}
.tab-btn{padding:12px 18px;background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;font:600 13px 'Tajawal';color:var(--text-light);white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:6px}
.tab-btn:hover{color:var(--navy);background:var(--row-alt)}
.tab-btn.active{color:var(--navy);border-bottom-color:var(--navy);font-weight:800}
.tab-icon{font-size:15px}
@media print{.tabs-row{display:none!important}}

/* ============ REPORT CONTAINERS ============ */
.rpt-wrap{max-width:1300px;margin:18px auto;padding:0 28px}
.rpt-card{background:var(--card);border-radius:12px;box-shadow:0 2px 14px rgba(0,0,0,.06);overflow:hidden}
.rpt-head{padding:18px 22px;border-bottom:2px solid var(--border-light);background:linear-gradient(135deg,#F8FAFC,#fff);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.rpt-title{font-size:18px;font-weight:800;color:var(--navy);display:flex;align-items:center;gap:8px}
.rpt-sub{font-size:12px;color:var(--text-light);margin-top:2px;font-weight:400}

/* ============ CONTROLS ROW ============ */
.rpt-ctrls{padding:14px 22px;background:var(--row-alt);border-bottom:1px solid var(--border-light);display:flex;gap:18px;flex-wrap:wrap;align-items:flex-end}
.rpt-ctrl{display:flex;flex-direction:column;gap:4px}
.rpt-ctrl label{font-size:11px;font-weight:700;color:var(--text-mid)}
.rpt-ctrl select,.rpt-ctrl input{padding:7px 12px;border:1.5px solid #CBD5E0;border-radius:8px;font:500 13px 'Tajawal';color:var(--text);background:#fff;outline:none;min-width:130px;cursor:pointer}
.rpt-ctrl select:focus,.rpt-ctrl input:focus{border-color:var(--accent-blue)}
.seg-btns{display:flex;border:1.5px solid #CBD5E0;border-radius:8px;overflow:hidden;background:#fff}
.seg-btn{padding:7px 14px;border:none;background:transparent;cursor:pointer;font:600 12px 'Tajawal';color:var(--text-mid);border-left:1px solid #CBD5E0;white-space:nowrap}
.seg-btn:first-child{border-left:none}
.seg-btn:hover{background:var(--header-bg)}
.seg-btn.active{background:var(--navy);color:#fff}

/* ============ DATA TABLE ============ */
.d-tbl-wrap{overflow-x:auto;padding:0}
.d-tbl{width:100%;border-collapse:collapse;font-size:13px}
.d-tbl thead th{background:var(--header-bg);border-bottom:2px solid var(--border);padding:10px 8px;text-align:center;font-weight:700;color:var(--text-mid);font-size:12px}
.d-tbl tbody td{border-bottom:1px solid var(--border-light);padding:8px;text-align:center;color:var(--text);vertical-align:middle}
.d-tbl tbody tr:nth-child(even) td{background:var(--row-alt)}
.track-sect .d-tbl tbody tr:nth-child(even) td{background:#fff}
.track-sect .d-tbl tbody tr:nth-child(even) td.sub-row{background:#E2E8F0!important}
.track-sect .d-tbl tbody tr:nth-child(even) td.total-row{background:#CBD5E0!important}
.d-tbl tbody tr:hover td{background:#EBF4FF}
.d-tbl tfoot td{background:var(--navy)!important;border-top:2px solid var(--border);padding:10px 8px;font-weight:800;color:#fff!important;font-size:13px;text-align:center}
.d-tbl tfoot td.money-paid,.d-tbl tfoot td .money-paid{color:#A7F3B5!important}
.d-tbl tfoot td.money-pending,.d-tbl tfoot td .money-pending{color:#FFC79A!important}
.d-tbl tfoot td.money{color:#fff!important}
.d-tbl .num{font-family:'Tajawal',sans-serif;font-weight:600;font-variant-numeric:tabular-nums;direction:ltr}
.d-tbl .money{font-family:'Tajawal',sans-serif;font-weight:700;font-variant-numeric:tabular-nums;direction:ltr;color:var(--navy)}
.d-tbl .money-paid{color:#2E7D32}
.d-tbl .money-pending{color:#C05621}
.d-tbl .nm-cell{text-align:right;font-weight:500}
.d-tbl .code-cell{font-weight:800;color:var(--navy);font-size:12px}
.d-tbl td.total-row,.d-tbl th.total-row{background:#CBD5E0!important;color:var(--navy)!important;font-weight:800}
.d-tbl td.sub-row{background:#E2E8F0!important;color:var(--navy)!important;font-weight:700}

/* Tracking report sub-sections: only active shown on screen; all 3 on print */
.track-sect{display:none}
.track-sect.active{display:block}
.track-sect-title{font-size:16px;font-weight:800;color:var(--navy);padding:16px 22px 10px;border-bottom:1px solid var(--border-light);background:var(--row-alt);display:none}
@media print{
  .track-sect{display:block!important}
  .track-sect-title{display:block!important}
  .track-sect+.track-sect{page-break-before:always}
}

/* Status badges */
.st-badge{display:inline-block;padding:3px 9px;border-radius:6px;font-size:10.5px;font-weight:700;white-space:nowrap}
.st-2{background:#D1FADF;color:#027A48}   /* تم السداد */
.st-3{background:#D1E9FF;color:#1849A9}   /* سداد بزيادة */
.st-4{background:#EAECF0;color:#344054}   /* مستحق */
.st-5{background:#FEF0C7;color:#B54708}   /* سداد جزء */
.st-6{background:#FEE4E2;color:#B42318}   /* غير مسدد بالكامل */
.st-7{background:#FFE4C7;color:#93370D}   /* جزء غير مسدد */
.st-8{background:#E0E7FF;color:#3730A3}   /* اقترب الميعاد */

/* ============ MATRIX TABLE (Report 1) ============ */
.mx-tbl{width:100%;border-collapse:collapse;font-size:13px}
.mx-tbl thead th{background:var(--navy);color:#fff;padding:11px 12px;text-align:center;font-weight:700;font-size:13px;border-left:1px solid rgba(255,255,255,.15);position:sticky;top:48px;z-index:3}
.mx-tbl thead th:last-child{border-left:none}
.mx-tbl tbody td{border-bottom:1px solid var(--border-light);border-left:1px solid var(--border-light);padding:9px 10px;text-align:center;vertical-align:middle}
.mx-tbl tbody td:last-child{border-left:none}
.mx-tbl tbody tr:nth-child(even) td{background:var(--row-alt)}
.mx-tbl tbody tr:hover td{background:#EBF4FF}
.mx-tbl .apt-col{font-weight:800;color:var(--navy);background:var(--header-bg)!important;text-align:center;min-width:70px}
.mx-tbl .apt-merged{background:var(--header-bg)!important}
.mx-tbl .tenant-col{text-align:right;font-weight:500;min-width:230px;padding-right:14px!important}
.mx-tbl tr.apt-first td{border-top:2px solid var(--border)}
.mx-tbl tr:first-child td{border-top:none}
.con-mark{display:inline-block;padding:4px 14px;border-radius:6px;background:linear-gradient(135deg,var(--clr-yearly),#60A5FA);color:#fff;font-weight:700;font-size:11px;box-shadow:0 1px 3px rgba(59,130,246,.3)}
.con-link{text-decoration:none;display:inline-block;transition:transform .15s}
.con-link:hover .con-mark{transform:translateY(-1px);box-shadow:0 3px 8px rgba(59,130,246,.45);filter:brightness(1.05)}
.con-link:hover .con-mark::after{content:" \u2197";font-size:9px;opacity:.8}
.con-mark-nolink{background:transparent!important;color:#94A3B8!important;border:1.5px dashed #CBD5E0;box-shadow:none!important;font-weight:600}
@media print{.con-link .con-mark{text-decoration:underline;text-underline-offset:2px}.con-mark-nolink{color:#94A3B8!important;border-color:#CBD5E0!important}}

/* ============ SUMMARY CARDS ============ */
.sum-row{display:flex;gap:12px;padding:16px 22px;background:var(--row-alt);border-bottom:1px solid var(--border-light);flex-wrap:wrap}
.sum-card{flex:1 1 160px;background:#fff;border-radius:10px;padding:12px 16px;border-right:4px solid var(--navy)}
.sum-card.green{border-right-color:var(--accent-green)}
.sum-card.orange{border-right-color:var(--accent-orange)}
.sum-card.red{border-right-color:var(--red)}
.sum-val{font-size:20px;font-weight:800;color:var(--navy);direction:ltr;text-align:right;font-variant-numeric:tabular-nums}
.sum-card.green .sum-val{color:#2E7D32}
.sum-card.orange .sum-val{color:#C05621}
.sum-card.red .sum-val{color:var(--red)}
.sum-lbl{font-size:11px;color:var(--text-light);font-weight:500;margin-top:2px}

/* ============ COLUMN SORT + FILTER ============ */
.th-title{cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:center;gap:4px}
.col-sort{font-size:10px;opacity:.55;transition:opacity .15s}
.th-title:hover .col-sort{opacity:1}
.col-sort.active{opacity:1}
.col-fbtn{display:inline-block;width:18px;height:18px;line-height:16px;text-align:center;font-size:11px;background:rgba(255,255,255,.15);color:inherit;border:1px solid rgba(255,255,255,.3);border-radius:3px;cursor:pointer;margin-right:4px;padding:0;font-family:inherit}
.col-fbtn:hover{background:rgba(255,255,255,.3)}
.col-fbtn.active{background:#F6AD55;color:#fff;border-color:#DD6B20}
.col-fpop{position:absolute;background:#fff;border:1px solid #CBD5E0;border-radius:6px;box-shadow:0 6px 20px rgba(0,0,0,.18);z-index:200;min-width:200px;max-width:280px;max-height:340px;display:flex;flex-direction:column;font-family:'Tajawal',sans-serif;color:var(--text);text-align:right}
.col-fpop input[type=text]{margin:8px;padding:5px 8px;font-size:12px;border:1px solid #CBD5E0;border-radius:4px;font-family:inherit;text-align:right}
.col-fpop .fpop-list{flex:1;overflow-y:auto;padding:4px 8px;font-size:12px;font-weight:normal}
.col-fpop .fpop-item{display:block;padding:3px 0;cursor:pointer;line-height:1.5}
.col-fpop .fpop-item:hover{background:#F7FAFC}
.col-fpop .fpop-item input{margin-left:6px;vertical-align:middle;cursor:pointer}
.col-fpop .fpop-bar{padding:8px;border-top:1px solid #E2E8F0;display:flex;gap:6px;background:#F7FAFC;border-radius:0 0 6px 6px}
.col-fpop .fpop-btn{flex:1;padding:5px 8px;font-size:11px;font-weight:600;border:1px solid #CBD5E0;background:#fff;color:var(--text);border-radius:4px;cursor:pointer;font-family:inherit}
.col-fpop .fpop-btn.primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.col-fpop .fpop-btn:hover{filter:brightness(.95)}
.col-fpop-overlay{position:fixed;inset:0;z-index:199}
@media print{.col-sort,.col-fbtn,.col-fpop,.col-fpop-overlay{display:none!important}.th-title{cursor:default}}

/* ============ PRINT ============ */
@media print{
  .rpt-wrap{max-width:none;padding:0;margin:0}
  .rpt-card{box-shadow:none;border:1px solid #ccc}
  .rpt-ctrls{display:none!important}
  .rpt-head{background:#fff;padding:10px 12px}
  .d-tbl thead th,.mx-tbl thead th{background:#2B4C7E!important;color:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .d-tbl,.mx-tbl{font-size:10.5px}
  .d-tbl tbody td,.mx-tbl tbody td{padding:5px 4px}
  .st-badge{padding:2px 6px;font-size:9.5px}
  .con-mark{padding:3px 10px;font-size:10px}
  .sum-row{page-break-inside:avoid}
  .section-break{page-break-before:always}
  tr{page-break-inside:avoid}
  thead{display:table-header-group}
  tfoot{display:table-footer-group}
  .mx-tbl thead th,.d-tbl thead th{position:static!important;top:auto!important}
  .d-tbl tfoot{display:table-row-group!important}
  .d-tbl tfoot td{background:#2B4C7E!important;color:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .d-tbl tfoot td.money-paid{color:#A7F3B5!important}
  .d-tbl tfoot td.money-pending{color:#FFC79A!important}
  .d-tbl td.total-row{background:#CBD5E0!important;color:#1A365D!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .d-tbl td.sub-row{background:#E2E8F0!important;color:#1A365D!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .mx-tbl.mx-wide{width:100%;table-layout:fixed}
  .mx-tbl.mx-wide th,.mx-tbl.mx-wide td{width:auto!important}
  .mx-tbl.mx-narrow{width:auto;margin:0 auto}
}

<script>
var MA=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
var ME=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
var SID="1HPVIpAeIwsFrmWKKQ_8XztvPDYZ1mENT_8mz3UyBA7s";
var allC=[],allS=[],allT=[];      /* Contracts, Schedules, Transactions */
var payableItems={};              /* Map: Item code → true (loaded from 1106_Items where Payment=2) */
var curY=new Date().getFullYear(),curB="all",curZoom=2;
var LANE_H=28,LANE_GAP=3,LANE_PAD=4;
var ZOOMS=[600,800,1100]; /* ★ 3 zoom levels: min-width px */

/* ★ NEW: View state */

/* Status codes (from 1103_Status) */
var ST_NAMES={1:'لاغي',2:'تم السداد',3:'سداد بزيادة',4:'مستحق',5:'سداد جزء',6:'غير مسدد بالكامل',7:'جزء غير مسدد',8:'اقترب الميعاد'};

function mkAc(ap,b){ap=Number(ap);b=String(b||"");if(isNaN(ap)||!b||b==="0")return b+ap;if(ap<0)return b+"-"+String(10+Math.abs(ap)).slice(-1);return b+String(100+ap).slice(-2);}
/* ★ Check if code is full building (XX00) */
function isFullBld(code){return/^[A-Z]00$/.test(code);}
function aptCount(code){return isFullBld(code)?APT_FULL_BUILDING:1;}
function fmt(d){if(!d)return"-";return d.getFullYear()+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+String(d.getDate()).padStart(2,"0");}
function fN(n){return n==null?"-":Number(n).toLocaleString("en-US");}
function doy(d,y){return Math.floor((d-new Date(y,0,1))/864e5);}
function diy(y){return(new Date(y,11,31)-new Date(y,0,1))/864e5+1;}
function barColors(c){if(c.lv)return{bg:'var(--clr-leave)',border:'var(--clr-leave-dark)',tc:'#991B1B'};if(c.pr===1)return{bg:'var(--clr-yearly)',border:'var(--clr-yearly-dark)',tc:'#1E3A5F'};if(c.pr===2)return{bg:'var(--clr-monthly)',border:'var(--clr-monthly-dark)',tc:'#7C2D12'};return{bg:'var(--clr-other)',border:'var(--clr-other-dark)',tc:'#374151'};}
function shareApp(){var url=window.location.href;if(navigator.share){navigator.share({title:'مخطط إيجارات الشقق',url:url}).catch(function(){});}else{navigator.clipboard.writeText(url).then(function(){var t=document.getElementById('shareToast');t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}).catch(function(){prompt('انسخ الرابط:',url);});}}
/* ★ Generic JSONP sheet loader */
function loadSheet(sheetName){return new Promise(function(ok,no){var cb="__g_"+Math.random().toString(36).slice(2);var tm=setTimeout(function(){delete window[cb];no(new Error("انتهت مهلة الاتصال بـ "+sheetName));},20000);window[cb]=function(r){clearTimeout(tm);delete window[cb];if(r.status!=="ok"){no(new Error(((r.errors||[])[0]||{}).message||r.status));return;}ok(r.table);};var s=document.createElement("script");s.setAttribute("data-g","1");s.src="https://docs.google.com/spreadsheets/d/"+SID+"/gviz/tq?tqx=responseHandler:"+cb+"&sheet="+encodeURIComponent(sheetName);s.onerror=function(){clearTimeout(tm);delete window[cb];no(new Error("فشل الاتصال — "+sheetName));};document.head.appendChild(s);});}

/* Parse Date(y,m,d) or Date(y,m,d,h,m,s) string from gviz */
function parseGvizDate(v){if(typeof v!=="string")return null;var m=v.match(/^Date\((\d+),(\d+),(\d+)(?:,(\d+),(\d+),(\d+))?\)$/);return m?new Date(+m[1],+m[2],+m[3],+(m[4]||0),+(m[5]||0),+(m[6]||0)):null;}

/* Load Items classification (1106_Items) — populates payableItems map (Item codes where Payment=2)
   Tries label first, falls back to id (A,B,C…). Tolerates string "2" or number 2. */
function loadItems(){return loadSheet("1106_Items").then(function(t){
  var idx={};
  t.cols.forEach(function(c,i){
    if(c.label)idx[String(c.label).trim()]=i;
    if(c.id)idx[String(c.id).trim()]=i;
  });
  function colIdx(names){for(var i=0;i<names.length;i++){if(idx[names[i]]!=null)return idx[names[i]];}return -1;}
  var iItem=colIdx(["Item","item","ItemCode","Code","البند","Item_Code","SN"]);
  var iPay =colIdx(["Payment","payment","Pay","Type","PaymentType","النوع","التصنيف"]);
  var map={};
  if(iItem<0||iPay<0){console.warn("loadItems: columns not found. iItem="+iItem+" iPay="+iPay+" cols="+t.cols.map(function(c){return c.label+"("+c.id+")";}).join(","));return map;}
  t.rows.forEach(function(row){
    var cells=row.c;if(!cells)return;
    var itC=cells[iItem],pyC=cells[iPay];
    var it=Number(itC&&itC.v||0);
    var pyRaw=pyC&&pyC.v;
    var py=Number(pyRaw);
    if(it && (py===2 || String(pyRaw).trim()==="2"))map[it]=true;
  });
  console.log("loadItems: payable items =",Object.keys(map));
  return map;
}).catch(function(e){console.warn("loadItems failed:",e);return {};});}

/* Load & parse Contracts (1201_Contracts) — Income (Item=1101) + Payables (Item in payableItems or Item=4201) */
function loadContracts(){return loadSheet("1201_Contracts").then(function(t){var ci={};t.cols.forEach(function(c,i){ci[c.label]=i;});var out=[];t.rows.forEach(function(row){var cells=row.c;if(!cells)return;function v(n){var i=ci[n];return(i!=null&&cells[i])?cells[i].v:null;}if(v("Cancel")===true)return;var it=Number(v("Item")||0);var kind;if(it===1101)kind='income';else if(payableItems[it]||it===4201)kind='payable';else return;function gd(n){var i=ci[n];if(i==null||!cells[i])return null;return parseGvizDate(cells[i].v);}var sd=gd("Date_Start"),ed=gd("Date_End");if(!sd||!ed)return;var lv=gd("Date_End_Leave");out.push({sn:Number(v("SN")||0),ac:mkAc(v("Ap_Number"),v("Bul_Code")),bc:String(v("Bul_Code")||""),pn:v("Person")||"",am:Number(v("Amount")||0),pays:Number(v("Payments")||1),pr:Number(v("Period")||0),sd:sd,ed:ed,lv:lv,de:lv||ed,lk:v("Link_Con")||"",kind:kind,it:it});});return out;});}

/* Load Schedules (1202_Schedule) */
function loadSchedules(){return loadSheet("1202_Schedule").then(function(t){var ci={};t.cols.forEach(function(c,i){ci[c.label]=i;});var out=[];t.rows.forEach(function(row){var cells=row.c;if(!cells)return;function v(n){var i=ci[n];return(i!=null&&cells[i])?cells[i].v:null;}var sn=Number(v("SN")||0),cs=Number(v("Con_SN")||0);if(!sn||!cs)return;var i=ci["Date"];var dt=(i!=null&&cells[i])?parseGvizDate(cells[i].v):null;if(!dt)return;out.push({sn:sn,cs:cs,am:Number(v("Amount")||0),dt:dt,cx:!!v("Cancel"),hd:!!v("Hide")});});return out;});}

/* Load Transactions (1203_Transactions) — all transactions; schedule join filters relevance */
function loadTransactions(){return loadSheet("1203_Transactions").then(function(t){var ci={};t.cols.forEach(function(c,i){ci[c.label]=i;});var out=[];t.rows.forEach(function(row){var cells=row.c;if(!cells)return;function v(n){var i=ci[n];return(i!=null&&cells[i])?cells[i].v:null;}var it=Number(v("Item")||0);var i=ci["Date"];var dt=(i!=null&&cells[i])?parseGvizDate(cells[i].v):null;if(!dt)return;out.push({sn:Number(v("SN")||0),dt:dt,it:it,nt:v("Note")||"",am:Number(v("Amount")||0),sc:Number(v("Schedule")||0),ap:v("Ap_Number2"),bl:v("Bul_Code2")||""});});return out;});}

/* Load all in parallel */
function loadAllData(){return new Promise(function(ok,no){document.querySelectorAll("script[data-g]").forEach(function(s){s.remove();});loadItems().then(function(im){payableItems=im;console.log("[DBG] payableItems keys:",Object.keys(im));return Promise.all([loadContracts(),loadSchedules(),loadTransactions()]);}).then(function(r){allC=r[0];allS=r[1];allT=r[2];var inc=allC.filter(function(c){return c.kind==='income';}).length;var pay=allC.filter(function(c){return c.kind==='payable';}).length;console.log("[DBG] contracts: income="+inc+" payable="+pay+" total="+allC.length);var payRows=buildScheduleRows('payable');console.log("[DBG] payable schedule rows:",payRows.length,payRows.slice(0,3));ok();}).catch(no);});}
function getF(){var ys=new Date(curY,0,1),ye=new Date(curY,11,31,23,59,59);return allC.filter(function(c){return c.kind===ganttKind&&!(c.sd>ye||c.de<ys)&&(curB==="all"||c.bc===curB);});}
function getAllApts(){var m={};allC.forEach(function(c){if(!m[c.ac])m[c.ac]={bc:c.bc};});return m;}
function sortCode(a,b){var ba=a.replace(/[\d-]/g,""),bb=b.replace(/[\d-]/g,"");if(ba!==bb)return ba.localeCompare(bb);var na=a.match(/-?\d+/),nb=b.match(/-?\d+/);na=na?parseInt(na[0]):0;nb=nb?parseInt(nb[0]):0;return na-nb;}
function getG(flt){var aa=getAllApts();var fm={};flt.forEach(function(c){if(!fm[c.ac])fm[c.ac]=[];fm[c.ac].push(c);});var codes=Object.keys(aa).filter(function(code){return curB==="all"||aa[code].bc===curB;}).sort(sortCode);return codes.map(function(code){return[code,fm[code]||[]];});}
function getYrs(){var s=new Set();allC.forEach(function(c){s.add(c.sd.getFullYear());s.add(c.de.getFullYear());});return Array.from(s).sort();}
function getBlds(){return Array.from(new Set(allC.map(function(c){return c.bc;}))).filter(function(b){return b&&b!=="0";}).sort();}
function assignLanes(cts,yS,yE){var items=cts.map(function(c){return{c:c,cs:c.sd<yS?yS:c.sd,ce:c.de>yE?yE:c.de};}).sort(function(a,b){return a.cs-b.cs;});var lanes=[],hasOv=false;items.forEach(function(it){var placed=false;for(var l=0;l<lanes.length;l++){if(it.cs>=lanes[l].end){lanes[l].end=it.ce;it.lane=l;placed=true;break;}}if(!placed){if(lanes.length>0)hasOv=true;it.lane=lanes.length;lanes.push({end:it.ce});}});return{items:items,lc:Math.max(lanes.length,1),ov:hasOv};}

function render(){
  updatePageSize();
  if(curView==='gantt')renderGantt();
  else if(curView==='matrix')renderMatrix();
  else if(curView==='due')renderDue();
  else if(curView==='duePay')renderDuePay();
  else if(curView==='tracking')renderTracking();

/* ============ TABLE ENHANCE: per-column sort + filter ============ */
function enhanceAllTables(){
  document.querySelectorAll('#app .d-tbl').forEach(enhanceDataTable);
}
function enhanceDataTable(table){
  if(table.dataset.enhanced)return;
  table.dataset.enhanced='1';
  var thead=table.querySelector('thead'),tbody=table.querySelector('tbody');
  if(!thead||!tbody)return;
  var hasGroups=!!tbody.querySelector('.sub-row, .total-row');
  var ths=thead.querySelectorAll('tr:last-child th');
  ths.forEach(function(th,idx){
    var origHtml=th.innerHTML;
    th.innerHTML='';
    var titleWrap=document.createElement('div');
    titleWrap.className='th-title';
    titleWrap.innerHTML=origHtml;
    var sortIcon=document.createElement('span');
    sortIcon.className='col-sort';
    sortIcon.textContent='⇅';
    titleWrap.appendChild(sortIcon);
    if(!hasGroups){
      titleWrap.addEventListener('click',function(){cycleSortColumn(table,idx,sortIcon);});
    }else{
      sortIcon.style.display='none';
      titleWrap.style.cursor='default';
    }
    var fbtn=document.createElement('button');
    fbtn.className='col-fbtn no-print';
    fbtn.type='button';
    fbtn.innerHTML='▾';
    fbtn.title='فلترة';
    fbtn.addEventListener('click',function(e){e.stopPropagation();openFilterPopup(table,idx,fbtn);});
    titleWrap.appendChild(fbtn);
    th.appendChild(titleWrap);
  });
  table._colFilters=table._colFilters||{};
}
function cycleSortColumn(table,colIdx,iconEl){
  var allIcons=table.querySelectorAll('.col-sort');
  var cur=iconEl.dataset.dir||'0';
  var next=cur==='0'?'1':(cur==='1'?'-1':'0');
  allIcons.forEach(function(s){s.dataset.dir='0';s.textContent='⇅';s.classList.remove('active');});
  iconEl.dataset.dir=next;
  if(next!=='0'){iconEl.classList.add('active');iconEl.textContent=next==='1'?'▲':'▼';}
  else{iconEl.textContent='⇅';}
  sortTableByColumn(table,colIdx,+next);
}
function sortTableByColumn(table,colIdx,dir){
  var tbody=table.querySelector('tbody');
  if(!tbody)return;
  var rows=Array.from(tbody.children).filter(function(r){return r.tagName==='TR';});
  if(dir===0){
    if(table._origOrder)table._origOrder.forEach(function(r){tbody.appendChild(r);});
    return;
  }
  if(!table._origOrder)table._origOrder=rows.slice();
  rows.sort(function(a,b){
    var ac=a.cells[colIdx],bc=b.cells[colIdx];
    var av=(ac?ac.textContent:'').trim(),bv=(bc?bc.textContent:'').trim();
    var an=parseFloat(av.replace(/[,،\s]/g,'')),bn=parseFloat(bv.replace(/[,،\s]/g,''));
    if(!isNaN(an)&&!isNaN(bn))return dir*(an-bn);
    return dir*av.localeCompare(bv,'ar');
  });
  rows.forEach(function(r){tbody.appendChild(r);});
}
function closeFilterPopups(){document.querySelectorAll('.col-fpop, .col-fpop-overlay').forEach(function(el){el.remove();});}
function openFilterPopup(table,colIdx,anchorEl){
  closeFilterPopups();
  var tbody=table.querySelector('tbody');
  if(!tbody)return;
  var rows=Array.from(tbody.children).filter(function(r){return r.tagName==='TR'&&!r.querySelector('.sub-row, .total-row');});
  var unique={};
  rows.forEach(function(r){var c=r.cells[colIdx];if(!c)return;var t=(c.textContent||'').trim();unique[t]=true;});
  var values=Object.keys(unique).sort(function(a,b){
    var an=parseFloat(a.replace(/[,،\s]/g,'')),bn=parseFloat(b.replace(/[,،\s]/g,''));
    if(!isNaN(an)&&!isNaN(bn))return an-bn;
    return a.localeCompare(b,'ar');
  });
  var curSel=table._colFilters[colIdx];
  var overlay=document.createElement('div');
  overlay.className='col-fpop-overlay';
  overlay.addEventListener('click',closeFilterPopups);
  document.body.appendChild(overlay);
  var pop=document.createElement('div');
  pop.className='col-fpop';
  pop.addEventListener('click',function(e){e.stopPropagation();});
  var searchInp=document.createElement('input');
  searchInp.type='text';
  searchInp.placeholder='ابحث...';
  pop.appendChild(searchInp);
  var listWrap=document.createElement('div');
  listWrap.className='fpop-list';
  var allLbl=document.createElement('label');
  allLbl.className='fpop-item';
  allLbl.style.fontWeight='700';
  allLbl.style.borderBottom='1px solid #E2E8F0';
  allLbl.style.paddingBottom='5px';
  allLbl.style.marginBottom='4px';
  var allCb=document.createElement('input');
  allCb.type='checkbox';
  allCb.checked=true;
  allLbl.appendChild(allCb);
  allLbl.appendChild(document.createTextNode(' (تحديد الكل)'));
  listWrap.appendChild(allLbl);
  var itemCbs=[];
  values.forEach(function(v){
    var lbl=document.createElement('label');
    lbl.className='fpop-item';
    var cb=document.createElement('input');
    cb.type='checkbox';
    cb.value=v;
    cb.checked=!curSel||curSel.has(v);
    lbl.appendChild(cb);
    lbl.appendChild(document.createTextNode(' '+(v===''?'(فارغ)':v)));
    listWrap.appendChild(lbl);
    itemCbs.push({cb:cb,lbl:lbl,val:v});
  });
  pop.appendChild(listWrap);

function applyExcelFilters(table){

/* ============ HELPERS FOR NEW REPORTS ============ */
function fmtD(d){if(!d||isNaN(d.getTime()))return"-";return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear();}
function getAllYears(){var s=new Set();allC.forEach(function(c){s.add(c.sd.getFullYear());});allS.forEach(function(x){if(!x.cx&&!x.hd)s.add(x.dt.getFullYear());});allT.forEach(function(x){s.add(x.dt.getFullYear());});return Array.from(s).sort(function(a,b){return a-b;});}
function contractBySN(){var m={};allC.forEach(function(c){m[c.sn]=c;});return m;}
function daysBetween(a,b){return Math.floor((b-a)/864e5);}

/* Compute status for a single schedule row: returns status code 1-8 */
function compStat(sched,collected,today){
  if(sched.cx)return 1;
  if(collected>sched.am+0.5)return 3;                    // سداد بزيادة
  if(Math.abs(collected-sched.am)<0.5)return 2;          // تم السداد
  var dUntil=daysBetween(today,sched.dt);
  if(collected>0.5){return dUntil<0?7:5;}                // جزء
  if(dUntil<0)return 6;                                  // غير مسدد بالكامل
  if(dUntil<=APPROACHING_DAYS)return 8;                  // اقترب الميعاد
  return 4;                                              // مستحق
}

/* Build enriched schedule rows: each includes contract, collected, status, order
   kind: 'income' (default) | 'payable' — filters by contract.kind */
function buildScheduleRows(kind){
  kind=kind||'income';
  var cBySN=contractBySN();
  var today=new Date();today.setHours(0,0,0,0);
  // Sum transactions per schedule
  var colBySc={};
  allT.forEach(function(t){if(t.sc){colBySc[t.sc]=(colBySc[t.sc]||0)+t.am;}});
  // Compute payment order within contract (by date ascending) — only within same kind
  var bySN={}; allS.forEach(function(s){var c=cBySN[s.cs];if(!c||c.kind!==kind)return;if(!bySN[s.cs])bySN[s.cs]=[];bySN[s.cs].push(s);});
  Object.keys(bySN).forEach(function(k){bySN[k].sort(function(a,b){return a.dt-b.dt;});bySN[k].forEach(function(s,i){s._ord=i+1;});});
  // Build rows
  var rows=[];
  allS.forEach(function(s){
    if(s.hd)return;
    var con=cBySN[s.cs];
    if(!con)return;
    if(con.kind!==kind)return;
    var coll=colBySc[s.sn]||0;
    var st=compStat(s,coll,today);
    if(st===1)return; // skip cancelled
    var days=Math.max(0,daysBetween(con.sd,con.ed));
    rows.push({s:s,c:con,coll:coll,pend:Math.max(0,s.am-coll),total:s.am,st:st,ord:s._ord,days:days});
  });
  return rows;
}

function renderMatrix(){

  // Base set: contracts with a tenant
  var baseC=allC.filter(function(c){return c.pn;});
  var allYrs=Array.from(new Set(baseC.map(function(c){return c.sd.getFullYear();}))).sort(function(a,b){return a-b;});
  if(!allYrs.length){document.getElementById("app").innerHTML=h+'<div class="rpt-wrap"><div class="rpt-card"><div class="empty-state">لا توجد عقود للعرض</div></div></div>';return;}

  // Initialize / validate year range
  if(matYearFrom==null||allYrs.indexOf(matYearFrom)<0)matYearFrom=allYrs[0];
  if(matYearTo==null||allYrs.indexOf(matYearTo)<0)matYearTo=allYrs[allYrs.length-1];
  if(matYearFrom>matYearTo){var _t=matYearFrom;matYearFrom=matYearTo;matYearTo=_t;}

  // Apply filters
  var cc=baseC.filter(function(c){
    var y=c.sd.getFullYear();
    if(y<matYearFrom||y>matYearTo)return false;
    if(matOnlyLink&&!c.lk)return false;
    return true;
  });

  // Year columns = full selected range
  var years=[]; for(var yy=matYearFrom;yy<=matYearTo;yy++)years.push(yy);

  // apt -> [{tenant, years:Set, first:year, links:{year:url}}]
  var aptMap={};
  cc.forEach(function(c){
    var a=c.ac,t=c.pn,y=c.sd.getFullYear();
    if(!aptMap[a])aptMap[a]=[];
    var found=aptMap[a].filter(function(x){return x.t===t;})[0];
    if(!found){found={t:t,years:new Set(),first:y,links:{}};aptMap[a].push(found);}
    found.years.add(y);

/* ============ REPORT 3: COLLECTIONS TRACKING ============ */
function renderTracking(){
  var h=renderHeaderTabs('متابعة المتحصلات — ملخص بالعمارة والشهور والتفصيلي');
  h+='<div class="header-print"><h1 class="hp-title">\u{1F4C8} متابعة المتحصلات</h1><p class="hp-sub">الفترة: '+trackYearFrom+' — '+trackYearTo+'</p></div>';

  var allYrs=getAllYears();
  if(!allYrs.length){document.getElementById("app").innerHTML=h+'<div class="rpt-wrap"><div class="rpt-card"><div class="empty-state">لا توجد بيانات</div></div></div>';return;}
  var _curYr=new Date().getFullYear();
  // Ensure current year is selectable in the dropdown
  if(allYrs.indexOf(_curYr)<0){allYrs.push(_curYr);allYrs.sort(function(a,b){return a-b;});}
  // Default: from current year → to last recorded year (forced on first visit per page load)
  if(!trackDefaultsApplied){
    trackYearFrom=_curYr;
    trackYearTo=allYrs[allYrs.length-1];
    trackDefaultsApplied=true;
  }
  if(trackYearFrom<allYrs[0])trackYearFrom=allYrs[0];
  if(trackYearFrom>allYrs[allYrs.length-1])trackYearFrom=allYrs[allYrs.length-1];
  if(trackYearTo<allYrs[0])trackYearTo=allYrs[0];
  if(trackYearTo>allYrs[allYrs.length-1])trackYearTo=allYrs[allYrs.length-1];
  if(trackYearFrom>trackYearTo)trackYearFrom=trackYearTo;

  // Build filtered schedule rows within year range
  var srows=buildScheduleRows();
  // Only include rows where due date year in range OR paid within range
  var inRange=function(y){return y>=trackYearFrom&&y<=trackYearTo;};

  // Prepare data per building, per month, and detailed rows
  // For each schedule: contributes collected and pending to the month of schedule.Date (if in range)
  var bldSum={}; // bld -> {coll,pend}
  var monSum={}; // "y-m" -> {coll,pend, y, m}
  var details={}; // "y-m" -> array of detail rows

  srows.forEach(function(r){
    var y=r.s.dt.getFullYear(),m=r.s.dt.getMonth();
    if(!inRange(y))return;
    var bc=r.c.bc||'?';
    if(!bldSum[bc])bldSum[bc]={coll:0,pend:0};
    bldSum[bc].coll+=r.coll; bldSum[bc].pend+=r.pend;
    var key=y+'-'+m;
    if(!monSum[key])monSum[key]={coll:0,pend:0,y:y,m:m};
    monSum[key].coll+=r.coll; monSum[key].pend+=r.pend;
    if(!details[key])details[key]=[];
    details[key].push(r);
  });

  // Grand totals
  var gColl=0,gPend=0;
  Object.keys(bldSum).forEach(function(k){gColl+=bldSum[k].coll;gPend+=bldSum[k].pend;});

  h+='<div class="rpt-wrap"><div class="rpt-card">';
  h+='<div class="rpt-head"><div><div class="rpt-title">\u{1F4C8} متابعة المتحصلات</div><div class="rpt-sub">تجميع المتحصلات والمبالغ المعلقة حسب الفترة المحددة</div></div></div>';

  // Controls: year range + subview
  h+='<div class="rpt-ctrls">';
  h+='<div class="rpt-ctrl"><label>من سنة</label><select onchange="sTFR(this.value)">';
  allYrs.forEach(function(y){h+='<option value="'+y+'"'+(y===trackYearFrom?' selected':'')+'>'+y+'</option>';});
  h+='</select></div>';
  h+='<div class="rpt-ctrl"><label>إلى سنة</label><select onchange="sTTO(this.value)">';
  allYrs.forEach(function(y){h+='<option value="'+y+'"'+(y===trackYearTo?' selected':'')+'>'+y+'</option>';});
  h+='</select></div>';
  h+='<div class="rpt-ctrl"><label>نوع العرض</label><div class="seg-btns">';
  h+='<button class="seg-btn'+(trackSubView==='bld'?' active':'')+'" onclick="sTV(\'bld\')">بالعمارة</button>';
  h+='<button class="seg-btn'+(trackSubView==='mon'?' active':'')+'" onclick="sTV(\'mon\')">بالشهور</button>';
  h+='<button class="seg-btn'+(trackSubView==='det'?' active':'')+'" onclick="sTV(\'det\')">تفصيلي</button>';
  h+='</div></div></div>';

  // Summary cards
  h+='<div class="sum-row"><div class="sum-card green"><div class="sum-val">'+fN(gColl)+'</div><div class="sum-lbl">تم التحصيل (ر.س)</div></div>';
  h+='<div class="sum-card orange"><div class="sum-val">'+fN(gPend)+'</div><div class="sum-lbl">بانتظار التحصيل (ر.س)</div></div>';
  h+='<div class="sum-card"><div class="sum-val">'+fN(gColl+gPend)+'</div><div class="sum-lbl">الإجمالي (ر.س)</div></div></div>';

  // Subview rendering: for screen show only active, for print show all 3
  h+='<div class="track-sections">';
  h+='<div class="track-sect'+(trackSubView==='bld'?' active':'')+'"><div class="track-sect-title">\u{1F3E2} ملخص بالعمارة</div>'+renderTrackBld(bldSum,gColl,gPend)+'</div>';
  h+='<div class="track-sect'+(trackSubView==='mon'?' active':'')+'"><div class="track-sect-title">\u{1F4C5} ملخص بالشهور</div>'+renderTrackMon(monSum,gColl,gPend)+'</div>';
  h+='<div class="track-sect'+(trackSubView==='det'?' active':'')+'"><div class="track-sect-title">\u{1F4CB} تفصيلي</div>'+renderTrackDet(monSum,details,gColl,gPend)+'</div>';
  h+='</div>';

  h+='</div></div>';
  h+='<div class="footer">الفترة: '+trackYearFrom+' — '+trackYearTo+' | آخر تحديث: '+new Date().toLocaleDateString("ar-EG")+'</div>';
  document.getElementById("app").innerHTML=h;
}

function renderTrackBld(bldSum,gColl,gPend){
  var h='<div class="d-tbl-wrap"><table class="d-tbl"><thead><tr><th>العمارة</th><th>تم التحصيل</th><th>بانتظار التحصيل</th><th>الإجمالي</th></tr></thead><tbody>';
  var blds=Object.keys(bldSum).sort();
  if(!blds.length)return '<div class="empty-state">لا توجد بيانات في الفترة المحددة</div>';
  blds.forEach(function(b){
    var x=bldSum[b];
    h+='<tr><td class="code-cell">'+b+'</td>';
    h+='<td class="money money-paid">'+fN(x.coll)+'</td>';
    h+='<td class="money money-pending">'+fN(x.pend)+'</td>';
    h+='<td class="money">'+fN(x.coll+x.pend)+'</td></tr>';
  });
  h+='</tbody><tfoot><tr><td>الإجمالي الكلي</td><td class="money money-paid">'+fN(gColl)+'</td><td class="money money-pending">'+fN(gPend)+'</td><td class="money">'+fN(gColl+gPend)+'</td></tr></tfoot></table></div>';
  return h;
}

function renderTrackMon(monSum,gColl,gPend){
  // Group by year, show months under each year
  var byYr={};
  Object.keys(monSum).forEach(function(k){var x=monSum[k];if(!byYr[x.y])byYr[x.y]={coll:0,pend:0,months:[]};byYr[x.y].coll+=x.coll;byYr[x.y].pend+=x.pend;byYr[x.y].months.push(x);});
  var yrs=Object.keys(byYr).map(Number).sort(function(a,b){return a-b;});
  if(!yrs.length)return '<div class="empty-state">لا توجد بيانات في الفترة المحددة</div>';
  var h='<div class="d-tbl-wrap"><table class="d-tbl"><thead><tr><th>السنة / الشهر</th><th>تم التحصيل</th><th>بانتظار التحصيل</th><th>الإجمالي</th></tr></thead><tbody>';
  yrs.forEach(function(y){
    var yr=byYr[y];
    h+='<tr><td class="sub-row code-cell">'+y+'</td>';
    h+='<td class="sub-row money money-paid">'+fN(yr.coll)+'</td>';
    h+='<td class="sub-row money money-pending">'+fN(yr.pend)+'</td>';
    h+='<td class="sub-row money">'+fN(yr.coll+yr.pend)+'</td></tr>';
    yr.months.sort(function(a,b){return a.m-b.m;}).forEach(function(mo){
      h+='<tr><td style="padding-right:30px;text-align:right">'+MA[mo.m]+'</td>';
      h+='<td class="money money-paid">'+fN(mo.coll)+'</td>';
      h+='<td class="money money-pending">'+fN(mo.pend)+'</td>';
      h+='<td class="money">'+fN(mo.coll+mo.pend)+'</td></tr>';
    });
  });
  h+='</tbody><tfoot><tr><td>الإجمالي الكلي</td><td class="money money-paid">'+fN(gColl)+'</td><td class="money money-pending">'+fN(gPend)+'</td><td class="money">'+fN(gColl+gPend)+'</td></tr></tfoot></table></div>';
  return h;
}

function renderTrackDet(monSum,details,gColl,gPend){
  // Show each schedule row with month/year headers
  var byYr={};
  Object.keys(monSum).forEach(function(k){var x=monSum[k];if(!byYr[x.y])byYr[x.y]={coll:0,pend:0,months:[]};byYr[x.y].coll+=x.coll;byYr[x.y].pend+=x.pend;byYr[x.y].months.push(x);});
  var yrs=Object.keys(byYr).map(Number).sort(function(a,b){return a-b;});
  if(!yrs.length)return '<div class="empty-state">لا توجد بيانات في الفترة المحددة</div>';

  var h='<div class="d-tbl-wrap"><table class="d-tbl"><thead><tr><th>السنة</th><th>الشهر</th><th>التاريخ</th><th>كود الشقة</th><th>المستأجر</th><th>عدد الأيام</th><th>ترتيب الدفعة</th><th>تم التحصيل</th><th>بانتظار التحصيل</th><th>الإجمالي</th></tr></thead><tbody>';

  yrs.forEach(function(y){
    var yr=byYr[y];
    yr.months.sort(function(a,b){return a.m-b.m;}).forEach(function(mo){
      var dets=details[y+'-'+mo.m];
      dets.sort(function(a,b){return a.s.dt-b.s.dt;});
      dets.forEach(function(r){
        h+='<tr>';
        h+='<td class="num">'+y+'</td>';
        h+='<td>'+MA[mo.m]+'</td>';
        h+='<td class="num">'+fmtD(r.s.dt)+'</td>';
        h+='<td class="code-cell">'+r.c.ac+'</td>';
        h+='<td class="nm-cell">'+escHtml(r.c.pn)+'</td>';
        h+='<td class="num">'+r.days+'</td>';
        h+='<td class="num">'+r.ord+'</td>';
        h+='<td class="money money-paid">'+fN(r.coll)+'</td>';
        h+='<td class="money money-pending">'+fN(r.pend)+'</td>';
        h+='<td class="money">'+fN(r.total)+'</td>';
        h+='</tr>';
      });
      // Month subtotal
      h+='<tr><td colspan="7" class="sub-row" style="text-align:left;padding-left:12px"><b>إجمالي '+MA[mo.m]+' '+y+'</b></td>';
      h+='<td class="sub-row money money-paid">'+fN(mo.coll)+'</td>';
      h+='<td class="sub-row money money-pending">'+fN(mo.pend)+'</td>';
      h+='<td class="sub-row money">'+fN(mo.coll+mo.pend)+'</td></tr>';
    });
    // Year subtotal
    h+='<tr><td colspan="7" class="total-row" style="text-align:left;padding-left:12px"><b>إجمالي سنة '+y+'</b></td>';
    h+='<td class="total-row money money-paid">'+fN(yr.coll)+'</td>';
    h+='<td class="total-row money money-pending">'+fN(yr.pend)+'</td>';
    h+='<td class="total-row money">'+fN(yr.coll+yr.pend)+'</td></tr>';
  });
  h+='</tbody><tfoot><tr><td colspan="7" style="text-align:left">الإجمالي الكلي</td><td class="money money-paid">'+fN(gColl)+'</td><td class="money money-pending">'+fN(gPend)+'</td><td class="money">'+fN(gColl+gPend)+'</td></tr></tfoot></table></div>';
  return h;
}

function sTFR(v){trackYearFrom=+v;if(trackYearFrom>trackYearTo)trackYearTo=trackYearFrom;render();}
function sTTO(v){trackYearTo=+v;if(trackYearTo<trackYearFrom)trackYearFrom=trackYearTo;render();}
function sTV(v){trackSubView=v;render();}
function sMFR(v){matYearFrom=+v;if(matYearFrom>matYearTo)matYearTo=matYearFrom;render();}
function sMTO(v){matYearTo=+v;if(matYearTo<matYearFrom)matYearFrom=matYearTo;render();}
function sMOL(v){matOnlyLink=!!v;render();}

function sY(y){curY=y;render();}
function chY(d){var yrs=getYrs(),i=yrs.indexOf(curY);curY=yrs[Math.max(0,Math.min(yrs.length-1,i+d))]||curY;render();}
function sB(b){curB=b;render();}
function sZ(z){curZoom=z;render();}
function sT(e,el){e.stopPropagation();cT();var r=el.getBoundingClientRect(),top=r.top-220,left=r.left+r.width/2-140;if(top<10)top=r.bottom+10;if(left<10)left=10;if(left+280>window.innerWidth)left=window.innerWidth-290;var ov=document.createElement("div");ov.className="tooltip-overlay";ov.onclick=cT;var t=document.createElement("div");t.className="tooltip-card";t.style.top=top+"px";t.style.left=left+"px";t.onclick=function(ev){ev.stopPropagation();};var hasLv=!!el.dataset.leave;var body='<div class="tip-row"><span class="tip-lbl">المستأجر</span><span class="tip-val">'+(el.dataset.person||"-")+'</span></div><div class="tip-row"><span class="tip-lbl">قيمة الإيجار</span><span class="tip-val">'+fN(+el.dataset.amount)+'</span></div><div class="tip-row"><span class="tip-lbl">بداية العقد</span><span class="tip-val">'+el.dataset.start+'</span></div><div class="tip-row"><span class="tip-lbl">نهاية العقد</span><span class="tip-val">'+el.dataset.end+'</span></div>';if(hasLv)body+='<div class="tip-row tip-row-red"><span class="tip-lbl">\u{1F6AA} تاريخ المغادرة</span><span class="tip-val">'+el.dataset.leave+'</span></div>';t.innerHTML='<button class="tip-close" onclick="cT()">\u2715</button><div class="tip-head"><span class="tip-badge" style="background:'+el.dataset.color+'">'+el.dataset.code+'</span><span class="tip-amount">'+fN(+el.dataset.amount)+' ر.س</span></div><div class="tip-body">'+body+'</div>';ov.appendChild(t);document.body.appendChild(ov);}
function cT(){document.querySelectorAll(".tooltip-overlay").forEach(function(el){el.remove();});}
document.addEventListener("keydown",function(e){if(e.key==="Escape")cT();});
async function init(){document.getElementById("app").innerHTML='<div class="loading-screen"><div class="spinner"></div><p class="loading-text">جاري تحميل البيانات من جوجل شيت...</p></div>';try{await loadAllData();var yrs=getYrs();if(!yrs.includes(curY))curY=yrs[yrs.length-1]||curY;/* init tracking year range defaults */if(trackYearFrom==null){var allYrs=getAllYears();trackYearFrom=allYrs[0]||curY;trackYearTo=allYrs[allYrs.length-1]||curY;}render();}catch(err){document.getElementById("app").innerHTML='<div class="error-screen"><div class="icon">\u26A0\uFE0F</div><h3>خطأ في تحميل البيانات</h3><p>'+err.message+'</p><p style="color:var(--text-muted);font-size:13px;margin-top:6px">تأكد من أن جوجل شيت مشارك بصلاحية عامة</p><button class="retry-btn" onclick="init()">إعادة المحاولة</button></div>';}}
init();
</script>
